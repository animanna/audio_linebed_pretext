<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skyfall Visualizer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #viz-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .controls {
      position: fixed;
      bottom: 28px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 16px;
    }

    .transport-shell {
      min-width: min(420px, calc(100vw - 32px));
      padding: 18px 20px 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        rgba(9, 9, 14, 0.72);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .controls .row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      justify-content: center;
    }

    .time-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      opacity: 0.58;
    }

    .seek-bar {
      --seek-progress: 0%;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 999px;
      background:
        linear-gradient(90deg,
          rgba(255, 255, 255, 0.92) 0%,
          rgba(255, 167, 62, 0.88) var(--seek-progress),
          rgba(255, 255, 255, 0.14) var(--seek-progress),
          rgba(255, 255, 255, 0.14) 100%);
      outline: none;
      cursor: pointer;
    }

    .seek-bar:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .seek-bar::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 999px;
      background: transparent;
    }

    .seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      margin-top: -5px;
      border: 0;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.14);
    }

    .seek-bar::-moz-range-track {
      height: 6px;
      border-radius: 999px;
      border: 0;
      background: rgba(255, 255, 255, 0.14);
    }

    .seek-bar::-moz-range-progress {
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.92), rgba(255, 167, 62, 0.88));
    }

    .seek-bar::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border: 0;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.14);
    }

    button {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
      min-width: 128px;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.3);
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .now-playing {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .lyrics-status {
      font-size: 11px;
      opacity: 0.42;
      font-weight: 300;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.3px;
      min-height: 1em;
      text-align: center;
    }

    @media (max-width: 640px) {
      .transport-shell {
        min-width: calc(100vw - 24px);
        padding: 16px;
      }

      .controls .row {
        gap: 8px;
      }

      button {
        flex: 1;
        min-width: 0;
      }

      .now-playing {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <canvas id="viz-canvas"></canvas>

  <div class="controls">
    <div class="transport-shell">
      <span class="now-playing" id="now-playing"></span>
      <span class="lyrics-status" id="lyrics-status" aria-live="polite"></span>
      <input
        type="range"
        id="seek-bar"
        class="seek-bar"
        min="0"
        max="1000"
        value="0"
        step="1"
        disabled
        aria-label="Audio progress"
      />
      <div class="time-row" aria-hidden="true">
        <span id="current-time">0:00</span>
        <span id="duration">0:00</span>
      </div>
      <div class="row">
        <button id="btn-play" disabled>Play</button>
        <button id="btn-pause" disabled>Pause</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
